<!DOCTYPE html>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
  @font-face { font-family: "Avenir"; src: url("assets/avenir-light.ttf") format("truetype"); font-weight: 300; font-display: swap; }
  @font-face { font-family: "Avenir"; src: url("assets/avenir-medium.ttf") format("truetype"); font-weight: 500; font-display: swap; }
  @font-face { font-family: "Avenir"; src: url("assets/avenir-black.ttf") format("truetype"); font-weight: 800; font-display: swap; }

  /* ===========================================================
     LIQUID GLASS · iOS 27 — sobre identidad Hospital San Diego de Alcalá
     Material translúcido (blur + saturación) con brillo especular,
     orbes de luz que el cristal refracta. Soporta tema claro y oscuro.
     =========================================================== */
  :root {
    --brand: #3C5876;
    --brand-deep: #2c4258;
    --brand-soft: #6f8aa6;
    --gold: #D29A5F;

    /* Fondo claro: azul HSDA luminoso para que el cristal refracte */
    --bg-grad-a: #dbe6f3;
    --bg-grad-b: #aec4de;
    --bg-base: #c4d4e8;

    /* Material de cristal (claro) */
    --glass: rgba(255,255,255,0.55);
    --glass-strong: rgba(255,255,255,0.80);
    --blur: blur(22px) saturate(180%);
    --hairline: rgba(255,255,255,0.85);
    --hairline-soft: rgba(255,255,255,0.5);
    --specular: inset 0 1.4px 0 rgba(255,255,255,0.9), inset 0 -1px 1px rgba(255,255,255,0.3);

    --card: var(--glass);
    --input-bg: rgba(255,255,255,0.55);
    --ink: #21364c;
    --ink-soft: #4f6479;
    --ink-faint: #7e91a6;
    --line: rgba(33,54,76,0.12);
    --track: rgba(33,54,76,0.10);

    --focus: #3C5876;  --focus-deep: #2c4258;
    --short: #4f8a76;  --short-deep: #3a6657;
    --long:  #b07c45;  --long-deep:  #8c6035;

    --shadow-sm: 0 6px 18px -10px rgba(33,54,76,0.30);
    --shadow-md: 0 22px 50px -22px rgba(33,54,76,0.5);
  }

  body[data-theme="dark"] {
    --brand: #7fa0c0;
    --brand-deep: #5d7d9c;
    --brand-soft: #8ea7c2;

    /* Fondo oscuro: navy HSDA profundo */
    --bg-grad-a: #2a425e;
    --bg-grad-b: #131d28;
    --bg-base: #16222f;

    /* Material de cristal (oscuro) */
    --glass: rgba(255,255,255,0.10);
    --glass-strong: rgba(255,255,255,0.18);
    --blur: blur(24px) saturate(170%);
    --hairline: rgba(255,255,255,0.28);
    --hairline-soft: rgba(255,255,255,0.14);
    --specular: inset 0 1.4px 0 rgba(255,255,255,0.5), inset 0 -1px 1px rgba(255,255,255,0.05);

    --card: var(--glass);
    --input-bg: rgba(255,255,255,0.07);
    --ink: #eef4fb;
    --ink-soft: #c0cfde;
    --ink-faint: #8499ac;
    --line: rgba(255,255,255,0.14);
    --track: rgba(255,255,255,0.10);

    --focus: #8fb3d8;  --focus-deep: #5d7d9c;
    --short: #6fb39c;  --short-deep: #4e8773;
    --long:  #e8b87e;  --long-deep:  #b07c45;

    --shadow-sm: 0 6px 18px -10px rgba(0,0,0,0.5);
    --shadow-md: 0 22px 50px -22px rgba(0,0,0,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Avenir", system-ui, sans-serif;
    font-weight: 500;
    color: var(--ink);
    background: var(--bg-base);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100dvh; }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 24px);
    background: radial-gradient(130% 70% at 50% -5%, var(--bg-grad-a), var(--bg-grad-b) 95%);
    position: relative;
    overflow: hidden;
  }
  /* Orbes de luz flotantes — color que refracta el cristal */
  .app::before {
    content: "";
    position: fixed; inset: -20%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(34% 30% at 18% 20%, var(--accent, #3C5876) 0%, transparent 60%),
      radial-gradient(32% 30% at 84% 28%, var(--brand-soft) 0%, transparent 62%),
      radial-gradient(40% 38% at 72% 90%, var(--gold, #D29A5F) 0%, transparent 60%),
      radial-gradient(28% 28% at 26% 84%, var(--accent, #3C5876) 0%, transparent 60%);
    opacity: 0.35;
    filter: blur(12px);
    animation: drift 24s ease-in-out infinite alternate;
  }
  body[data-theme="dark"] .app::before { opacity: 0.5; }
  @keyframes drift {
    0%   { transform: translate3d(0,0,0) scale(1); }
    50%  { transform: translate3d(3%, -2%, 0) scale(1.08); }
    100% { transform: translate3d(-3%, 3%, 0) scale(1.04); }
  }
  .shell { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }

  .app.m-focus { --accent: var(--focus); --accent-deep: var(--focus-deep); }
  .app.m-short { --accent: var(--short); --accent-deep: var(--short-deep); }
  .app.m-long  { --accent: var(--long);  --accent-deep: var(--long-deep); }

  /* ---------- Header ---------- */
  .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: clamp(16px, 4vh, 30px); }
  .logo-h { height: 34px; width: auto; display: block; }
  .topbar-actions { display: flex; gap: 10px; }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 14px; border: 1px solid var(--hairline);
    background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    color: var(--brand); display: grid; place-items: center;
    cursor: pointer; box-shadow: var(--specular), var(--shadow-sm); transition: transform 0.3s, background 0.2s;
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* ---------- Mode tabs (cápsula de cristal) ---------- */
  .tabs { display: inline-flex; gap: 3px; padding: 4px; border-radius: 100px; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--hairline); box-shadow: var(--specular), var(--shadow-sm); margin-bottom: clamp(20px, 4vh, 34px); }
  .tab { border: 0; background: transparent; color: var(--ink-soft); font-family: inherit; font-weight: 500; font-size: 0.8rem; padding: 9px 15px; border-radius: 100px; cursor: pointer; transition: color 0.25s, background 0.25s; white-space: nowrap; }
  .tab.active { background: var(--accent); color: #fff; box-shadow: inset 0 1.2px 0 rgba(255,255,255,0.4), 0 6px 16px -4px var(--accent); }

  /* ---------- Dial ---------- */
  .dial-wrap { position: relative; width: min(72vw, 300px); aspect-ratio: 1; display: grid; place-items: center; }
  .dial-wrap::before {
    content: ""; position: absolute; inset: 7%; border-radius: 50%;
    background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--hairline-soft); box-shadow: var(--specular), var(--shadow-md);
  }
  .dial { width: 100%; height: 100%; transform: rotate(-90deg); position: relative; z-index: 1; }
  .dial-track { fill: none; stroke: var(--track); }
  .dial-prog { fill: none; stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.4s linear, stroke 0.5s ease; filter: drop-shadow(0 0 12px var(--accent)); }
  .dial-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; z-index: 2; }
  .time { font-family: "Avenir"; font-weight: 800; font-variant-numeric: tabular-nums; font-size: clamp(3.2rem, 16vw, 4.4rem); line-height: 1; color: var(--ink); letter-spacing: -0.01em; }
  .phase-label { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 800; }

  .dots { display: flex; gap: 7px; margin-top: 16px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--track); transition: background 0.3s, transform 0.3s; }
  .dot.filled { background: var(--accent); transform: scale(1.2); box-shadow: 0 0 8px var(--accent); }

  /* ---------- Controls ---------- */
  .controls { display: flex; align-items: center; gap: 16px; margin-top: clamp(18px, 4vh, 30px); }
  .btn { border: 0; cursor: pointer; font-family: inherit; display: grid; place-items: center; transition: transform 0.15s; }
  .btn:active { transform: scale(0.92); }
  .btn-primary {
    position: relative; width: 82px; height: 82px; border-radius: 50%;
    background: linear-gradient(155deg, color-mix(in srgb, var(--accent) 82%, white 18%), var(--accent-deep));
    color: #fff; border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 16px 34px -8px var(--accent), inset 0 2px 1px rgba(255,255,255,0.55), inset 0 -8px 16px -8px rgba(0,0,0,0.3);
  }
  .btn-primary::after { content: ""; position: absolute; top: 9%; left: 16%; right: 26%; height: 32%; border-radius: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.6), transparent); filter: blur(2px); pointer-events: none; }
  .btn-primary svg { width: 30px; height: 30px; position: relative; z-index: 1; }
  .btn-ghost { width: 54px; height: 54px; border-radius: 50%; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--hairline); color: var(--ink-soft); box-shadow: var(--specular), var(--shadow-sm); }
  .btn-ghost svg { width: 21px; height: 21px; }

  /* ---------- Stats ---------- */
  .stats { display: flex; align-items: center; gap: 8px; margin-top: clamp(20px, 4vh, 30px); padding: 12px 22px; border-radius: 20px; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--hairline-soft); box-shadow: var(--specular), var(--shadow-sm); }
  .stat { text-align: center; padding: 0 14px; }
  .stat-val { font-family: "Avenir"; font-weight: 800; font-size: 1.4rem; color: var(--brand); }
  .stat-lab { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-top: 2px; }
  .stat-sep { width: 1px; height: 30px; background: var(--hairline-soft); }

  /* ---------- Tasks (panel de cristal) ---------- */
  .tasks { width: 100%; margin-top: clamp(22px, 5vh, 34px); background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--hairline); border-radius: 22px; box-shadow: var(--specular), var(--shadow-sm); padding: 18px; }
  .tasks-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .tasks-title { font-weight: 800; font-size: 0.95rem; color: var(--ink); }
  .tasks-count { font-size: 0.74rem; color: var(--ink-faint); }
  .task-add { display: flex; gap: 8px; margin-bottom: 12px; }
  .task-add input {
    flex: 1; border: 1px solid var(--hairline-soft); background: var(--input-bg); border-radius: 12px;
    padding: 11px 13px; font-family: inherit; font-size: 0.9rem; color: var(--ink); outline: none;
    transition: border-color 0.2s;
  }
  .task-add input::placeholder { color: var(--ink-faint); }
  .task-add input:focus { border-color: var(--brand-soft); }
  .task-add button {
    flex: none; width: 44px; border: 1px solid rgba(255,255,255,0.4); border-radius: 12px; background: var(--brand); color: #fff;
    font-size: 1.4rem; cursor: pointer; display: grid; place-items: center; line-height: 1; box-shadow: inset 0 1.2px 0 rgba(255,255,255,0.4);
  }
  .task-add button:active { transform: scale(0.93); }
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .task-item { display: flex; align-items: center; gap: 11px; padding: 10px 4px; border-bottom: 1px solid var(--line); }
  .task-item:last-child { border-bottom: 0; }
  .check { flex: none; width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--brand-soft); cursor: pointer; display: grid; place-items: center; transition: background 0.2s, border-color 0.2s; }
  .check.done { background: var(--brand); border-color: var(--brand); }
  .check svg { width: 13px; height: 13px; color: #fff; opacity: 0; transition: opacity 0.2s; }
  .check.done svg { opacity: 1; }
  .task-text { flex: 1; font-size: 0.9rem; color: var(--ink); transition: color 0.2s; word-break: break-word; }
  .task-text.done { color: var(--ink-faint); text-decoration: line-through; }
  .task-del { flex: none; border: 0; background: transparent; color: var(--ink-faint); cursor: pointer; font-size: 1.1rem; padding: 4px 6px; border-radius: 8px; }
  .task-del:active { color: #d9544f; }
  .task-empty { text-align: center; color: var(--ink-faint); font-size: 0.85rem; padding: 14px 0; }

  /* ---------- Install banner ---------- */
  .install { width: 100%; margin-top: 16px; background: var(--brand); color: #fff; border-radius: 16px; padding: 13px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow-md); }
  .install p { font-size: 0.84rem; line-height: 1.3; flex: 1; }
  .install b { font-weight: 800; }
  .install button { flex: none; border: 0; background: #fff; color: var(--brand); font-family: inherit; font-weight: 800; font-size: 0.82rem; padding: 9px 14px; border-radius: 10px; cursor: pointer; }
  .install .x { background: transparent; color: rgba(255,255,255,0.7); padding: 6px; font-size: 1rem; }

  .footer { margin-top: 22px; font-size: 0.66rem; color: var(--ink-faint); letter-spacing: 0.05em; text-align: center; }

  /* ---------- Settings sheet (cristal flotante) ---------- */
  .scrim { position: fixed; inset: 0; background: rgba(20,32,46,0.35); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 12px; right: 12px; bottom: 12px; background: var(--glass-strong); -webkit-backdrop-filter: blur(36px) saturate(190%); backdrop-filter: blur(36px) saturate(190%); border-radius: 32px; border: 1px solid var(--hairline); padding: 8px 22px calc(env(safe-area-inset-bottom) + 24px); z-index: 21; transform: translateY(115%); transition: transform 0.42s cubic-bezier(0.32,0.72,0,1); max-width: 480px; margin: 0 auto; box-shadow: var(--specular), var(--shadow-md); }
  .sheet.open { transform: translateY(0); }
  .grab { width: 40px; height: 5px; border-radius: 4px; background: var(--hairline); margin: 8px auto 16px; }
  .sheet h2 { font-weight: 800; font-size: 1.2rem; margin-bottom: 14px; color: var(--ink); }
  .setting { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .setting:last-of-type { border-bottom: 0; }
  .setting-info { display: flex; flex-direction: column; gap: 2px; }
  .setting-name { font-weight: 500; font-size: 0.92rem; color: var(--ink); }
  .setting-desc { font-size: 0.72rem; color: var(--ink-faint); }
  .stepper { display: flex; align-items: center; gap: 4px; background: var(--track); border: 1px solid var(--hairline-soft); border-radius: 100px; padding: 4px; }
  .stepper button { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--hairline-soft); cursor: pointer; background: var(--glass-strong); color: var(--brand); font-size: 1.2rem; line-height: 1; display: grid; place-items: center; font-family: inherit; box-shadow: inset 0 1.2px 0 rgba(255,255,255,0.5); }
  .stepper button:active { transform: scale(0.9); }
  .stepper span { min-width: 50px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 800; font-size: 0.9rem; color: var(--ink); }
  .toggle { width: 50px; height: 30px; border-radius: 100px; border: 1px solid var(--hairline-soft); background: var(--track); position: relative; cursor: pointer; transition: background 0.25s; }
  .toggle.on { background: var(--brand); border-color: var(--brand); box-shadow: 0 0 12px -2px var(--brand); }
  .toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.25); transition: transform 0.25s; }
  .toggle.on::after { transform: translateX(20px); }
  .test-sound { border: 1px solid var(--hairline-soft); background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); color: var(--brand); font-family: inherit; font-weight: 600; font-size: 0.8rem; padding: 8px 14px; border-radius: 100px; cursor: pointer; }
  .test-sound:active { transform: scale(0.94); }

  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  .pulsing { animation: pop 2.4s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) { .app::before { animation: none; } .pulsing { animation: none; } }
</style>

<div id="root"></div>

<script type="text/app-jsx" id="app-src">
const { useState, useEffect, useRef, useCallback } = React;

const HOSPITAL = { name: "Hospital San Diego de Alcalá", unit: "Programa de Enfoque" };

const MODES = {
  focus: { key: "focus", label: "Enfoque",     accent: "#3C5876", deep: "#2c4258" },
  short: { key: "short", label: "Pausa breve", accent: "#4f8a76", deep: "#3a6657" },
  long:  { key: "long",  label: "Pausa larga", accent: "#b07c45", deep: "#8c6035" },
};

const DEFAULTS = { focus: 25, short: 5, long: 15, autoStart: true, sound: true, rounds: 4 };

const store = {
  get(k, fb) { try { const v = JSON.parse(localStorage.getItem(k)); return v ?? fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// Un solo AudioContext compartido; los móviles exigen desbloquearlo con un toque.
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  return audioCtx;
}
function unlockAudio() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume().catch(() => {});
  try { // buffer silencioso: desbloquea el audio en iOS/Android
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource();
    s.buffer = b; s.connect(ctx.destination); s.start(0);
  } catch {}
}
function beep() {
  // Campanita de 4 notas ascendentes, audible y clara.
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume().catch(() => {});
  const master = ctx.createGain();
  master.gain.value = 0.95;            // volumen alto
  master.connect(ctx.destination);
  const notes = [659.25, 830.61, 987.77, 1318.51]; // E5 · G#5 · B5 · E6
  notes.forEach((freq, i) => {
    const start = ctx.currentTime + i * 0.13;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = freq;
    o.connect(g); g.connect(master);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(0.85, start + 0.03);   // ataque suave
    g.gain.exponentialRampToValueAtTime(0.0001, start + 0.55); // decaimiento natural
    o.start(start); o.stop(start + 0.57);
  });
}
function notify(msg) {
  // Notificación del sistema: el teléfono la sonará/vibrará según sus ajustes.
  try {
    if ("Notification" in window && Notification.permission === "granted") {
      new Notification("Enfoque HSDA", {
        body: msg, icon: "icons/icon-192.png", tag: "pomo-enfoque",
        vibrate: [200, 100, 200], renotify: true,
      });
    }
  } catch {}
}

const Icon = {
  play: <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.54.84l10-6.5a1 1 0 0 0 0-1.68l-10-6.5A1 1 0 0 0 8 5.5Z"/></svg>,
  pause: <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4.2" height="14" rx="1.4"/><rect x="13.8" y="5" width="4.2" height="14" rx="1.4"/></svg>,
  reset: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>,
  skip: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 5l9 7-9 7V5ZM19 5v14"/></svg>,
  gear: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V15a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12l5 5L20 6"/></svg>,
  moon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>,
  sun: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>,
};

function Stepper({ value, min, max, step, onChange, suffix }) {
  return (
    <div className="stepper">
      <button onClick={() => onChange(Math.max(min, value - step))} aria-label="Menos">−</button>
      <span>{value}{suffix}</span>
      <button onClick={() => onChange(Math.min(max, value + step))} aria-label="Más">+</button>
    </div>
  );
}

function App() {
  const [settings, setSettings] = useState(() => ({ ...DEFAULTS, ...store.get("pomo-settings", {}) }));
  const [mode, setMode] = useState("focus");
  const [secondsLeft, setSecondsLeft] = useState(settings.focus * 60);
  const [running, setRunning] = useState(false);
  const [completed, setCompleted] = useState(0);
  const [roundInCycle, setRoundInCycle] = useState(0);
  const [focusMinutes, setFocusMinutes] = useState(0);
  const [showSettings, setShowSettings] = useState(false);
  const [tasks, setTasks] = useState(() => store.get("pomo-tasks", []));
  const [draft, setDraft] = useState("");
  const [theme, setTheme] = useState(() => {
    const saved = store.get("pomo-theme", null);
    if (saved === "dark" || saved === "light") return saved;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  });
  const [deferred, setDeferred] = useState(null);   // PWA install prompt
  const intervalRef = useRef(null);

  const cfg = MODES[mode];
  const totalSeconds = settings[mode] * 60;

  useEffect(() => { store.set("pomo-settings", settings); }, [settings]);
  useEffect(() => { store.set("pomo-tasks", tasks); }, [tasks]);
  useEffect(() => {
    document.body.dataset.theme = theme;
    store.set("pomo-theme", theme);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", theme === "dark" ? "#0e1721" : "#3C5876");
  }, [theme]);
  useEffect(() => { if (!running) setSecondsLeft(settings[mode] * 60); }, [mode, settings.focus, settings.short, settings.long]);

  // PWA install prompt capture
  useEffect(() => {
    const h = (e) => { e.preventDefault(); setDeferred(e); };
    window.addEventListener("beforeinstallprompt", h);
    return () => window.removeEventListener("beforeinstallprompt", h);
  }, []);

  // Desbloquea el audio en el primer toque/click (requisito de los navegadores móviles)
  useEffect(() => {
    const onGesture = () => unlockAudio();
    window.addEventListener("pointerdown", onGesture);
    window.addEventListener("touchstart", onGesture);
    return () => {
      window.removeEventListener("pointerdown", onGesture);
      window.removeEventListener("touchstart", onGesture);
    };
  }, []);

  const switchMode = useCallback((next, auto = false) => {
    setMode(next);
    setSecondsLeft(settings[next] * 60);
    setRunning(auto && settings.autoStart);
  }, [settings]);

  const handleComplete = useCallback(() => {
    if (settings.sound) {
      beep();
      notify(mode === "focus" ? "Tiempo de enfoque terminado. Toma un descanso." : "Descanso terminado. A enfocarse.");
    }
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    if (mode === "focus") {
      setCompleted((c) => c + 1);
      setFocusMinutes((m) => m + settings.focus);
      const nextRound = roundInCycle + 1;
      if (nextRound >= settings.rounds) { setRoundInCycle(0); switchMode("long", true); }
      else { setRoundInCycle(nextRound); switchMode("short", true); }
    } else {
      switchMode("focus", true);
    }
  }, [mode, roundInCycle, settings, switchMode]);

  useEffect(() => {
    if (!running) return;
    intervalRef.current = setInterval(() => {
      setSecondsLeft((s) => {
        if (s <= 1) { clearInterval(intervalRef.current); setRunning(false); setTimeout(handleComplete, 0); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running, handleComplete]);

  useEffect(() => {
    const m = Math.floor(secondsLeft / 60).toString().padStart(2, "0");
    const s = (secondsLeft % 60).toString().padStart(2, "0");
    document.title = `${m}:${s} · ${cfg.label}`;
  }, [secondsLeft, cfg.label]);

  const toggleRun = () => {
    unlockAudio(); // desbloquea el audio dentro del gesto del usuario (clave en móvil)
    if (settings.sound && "Notification" in window && Notification.permission === "default") {
      Notification.requestPermission().catch(() => {});
    }
    if (!running && secondsLeft === 0) setSecondsLeft(totalSeconds);
    setRunning((r) => !r);
  };
  const reset = () => { setRunning(false); setSecondsLeft(totalSeconds); };
  const skip = () => { setRunning(false); handleComplete(); };

  const addTask = () => {
    const t = draft.trim(); if (!t) return;
    setTasks((arr) => [...arr, { id: Date.now(), text: t, done: false }]);
    setDraft("");
  };
  const toggleTask = (id) => setTasks((arr) => arr.map((t) => t.id === id ? { ...t, done: !t.done } : t));
  const delTask = (id) => setTasks((arr) => arr.filter((t) => t.id !== id));

  const install = async () => { if (!deferred) return; deferred.prompt(); await deferred.userChoice; setDeferred(null); };

  const R = 138, C = 2 * Math.PI * R;
  const progress = totalSeconds ? secondsLeft / totalSeconds : 0;
  const offset = C * (1 - progress);
  const mm = Math.floor(secondsLeft / 60).toString().padStart(2, "0");
  const ss = (secondsLeft % 60).toString().padStart(2, "0");
  const doneCount = tasks.filter((t) => t.done).length;
  const logoSrc = theme === "dark" ? "assets/logo-horizontal-blanco.png" : "assets/logo-horizontal.png";

  return (
    <div className={`app m-${mode}`}>
      <div className="shell">
        <div className="topbar">
          <img className="logo-h" src={logoSrc} alt="Hospital San Diego de Alcalá" />
          <div className="topbar-actions">
            <button className="icon-btn" onClick={() => setTheme((t) => t === "dark" ? "light" : "dark")}
              aria-label={theme === "dark" ? "Modo claro" : "Modo oscuro"}>
              {theme === "dark" ? Icon.sun : Icon.moon}
            </button>
            <button className="icon-btn" onClick={() => setShowSettings(true)} aria-label="Ajustes">{Icon.gear}</button>
          </div>
        </div>

        <div className="tabs" role="tablist">
          {Object.values(MODES).map((m) => (
            <button key={m.key} role="tab" aria-selected={mode === m.key}
              className={`tab ${mode === m.key ? "active" : ""}`} onClick={() => switchMode(m.key)}>
              {m.label}
            </button>
          ))}
        </div>

        <div className="dial-wrap">
          <svg className="dial" viewBox="0 0 320 320">
            <circle className="dial-track" cx="160" cy="160" r={R} strokeWidth="13" />
            <circle className="dial-prog" cx="160" cy="160" r={R} strokeWidth="13" strokeDasharray={C} strokeDashoffset={offset} />
          </svg>
          <div className={`dial-center ${running ? "pulsing" : ""}`}>
            <span className="time">{mm}:{ss}</span>
            <span className="phase-label">{cfg.label}</span>
          </div>
        </div>

        <div className="dots">
          {Array.from({ length: settings.rounds }).map((_, i) => (
            <span key={i} className={`dot ${i < roundInCycle ? "filled" : ""}`} />
          ))}
        </div>

        <div className="controls">
          <button className="btn btn-ghost" onClick={reset} aria-label="Reiniciar">{Icon.reset}</button>
          <button className="btn btn-primary" onClick={toggleRun} aria-label={running ? "Pausar" : "Iniciar"}>
            {running ? Icon.pause : Icon.play}
          </button>
          <button className="btn btn-ghost" onClick={skip} aria-label="Saltar">{Icon.skip}</button>
        </div>

        <div className="stats">
          <div className="stat"><div className="stat-val">{completed}</div><div className="stat-lab">Sesiones</div></div>
          <div className="stat-sep" />
          <div className="stat"><div className="stat-val">{focusMinutes}</div><div className="stat-lab">Min enfoque</div></div>
        </div>

        {/* Lista de tareas por sesión */}
        <div className="tasks">
          <div className="tasks-head">
            <span className="tasks-title">Tareas de la sesión</span>
            <span className="tasks-count">{doneCount}/{tasks.length}</span>
          </div>
          <div className="task-add">
            <input value={draft} onChange={(e) => setDraft(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addTask()}
              placeholder="¿En qué te vas a enfocar?" maxLength={80} />
            <button onClick={addTask} aria-label="Agregar tarea">+</button>
          </div>
          <ul className="task-list">
            {tasks.length === 0 && <li className="task-empty">Aún no hay tareas. Agrega tu primer objetivo.</li>}
            {tasks.map((t) => (
              <li className="task-item" key={t.id}>
                <div className={`check ${t.done ? "done" : ""}`} onClick={() => toggleTask(t.id)} role="checkbox" aria-checked={t.done}>{Icon.check}</div>
                <span className={`task-text ${t.done ? "done" : ""}`} onClick={() => toggleTask(t.id)}>{t.text}</span>
                <button className="task-del" onClick={() => delTask(t.id)} aria-label="Eliminar">✕</button>
              </li>
            ))}
          </ul>
        </div>

        {deferred && (
          <div className="install">
            <p><b>Instala la app</b> en tu pantalla de inicio para abrirla con un toque.</p>
            <button onClick={install}>Instalar</button>
            <button className="x" onClick={() => setDeferred(null)} aria-label="Cerrar">✕</button>
          </div>
        )}

        <div className="footer">{HOSPITAL.name} · {HOSPITAL.unit}</div>
      </div>

      {/* Ajustes */}
      <div className={`scrim ${showSettings ? "open" : ""}`} onClick={() => setShowSettings(false)} />
      <div className={`sheet ${showSettings ? "open" : ""}`} role="dialog" aria-label="Ajustes">
        <div className="grab" />
        <h2>Ajustes</h2>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Duración del enfoque</span><span className="setting-desc">Tiempo de concentración</span></div>
          <Stepper value={settings.focus} min={5} max={90} step={5} suffix=" min" onChange={(v) => setSettings((s) => ({ ...s, focus: v }))} />
        </div>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Pausa breve</span><span className="setting-desc">Descanso entre sesiones</span></div>
          <Stepper value={settings.short} min={1} max={30} step={1} suffix=" min" onChange={(v) => setSettings((s) => ({ ...s, short: v }))} />
        </div>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Pausa larga</span><span className="setting-desc">Descanso tras varias rondas</span></div>
          <Stepper value={settings.long} min={5} max={45} step={5} suffix=" min" onChange={(v) => setSettings((s) => ({ ...s, long: v }))} />
        </div>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Rondas por ciclo</span><span className="setting-desc">Enfoques antes de la pausa larga</span></div>
          <Stepper value={settings.rounds} min={2} max={8} step={1} suffix="" onChange={(v) => setSettings((s) => ({ ...s, rounds: v }))} />
        </div>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Inicio automático</span><span className="setting-desc">Encadena enfoque y pausas</span></div>
          <div className={`toggle ${settings.autoStart ? "on" : ""}`} onClick={() => setSettings((s) => ({ ...s, autoStart: !s.autoStart }))} role="switch" aria-checked={settings.autoStart} />
        </div>
        <div className="setting">
          <div className="setting-info"><span className="setting-name">Sonido al terminar</span><span className="setting-desc">Alerta y vibración</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
            <button className="test-sound" onClick={() => { unlockAudio(); beep(); if (navigator.vibrate) navigator.vibrate([200,100,200]); }}>Probar</button>
            <div className={`toggle ${settings.sound ? "on" : ""}`} onClick={() => setSettings((s) => ({ ...s, sound: !s.sound }))} role="switch" aria-checked={settings.sound} />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  // Compila el JSX con runtime CLÁSICO (evita imports del runtime automático) y lo ejecuta.
  (function () {
    try {
      var src = document.getElementById("app-src").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      (0, eval)(out);
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<p style="padding:24px;font-family:sans-serif;color:#b00">Error al iniciar: ' + err.message + "</p>";
      console.error(err);
    }
    // Registrar service worker (PWA)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  })();
</script>
</body>
</html>
